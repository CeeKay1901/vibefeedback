<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VibeFeedback — Dashboard</title>
<meta name="description" content="Projekt-Cockpit für dein Feedback: Insights, Status-Workflow und direkter Absprung ins Feedback-Tool — lokal in deinem Browser.">
<link rel="icon" href="pilot-logo.svg">
<style>
/* ===== Tokens: pilot-CI für Chrome, validierte Data-Viz-Palette für Charts ===== */
:root{
  --bg:#fcfcfc; --panel:#fff; --panel-2:#f6f6f3; --line:#e3e1d6;
  --fg:#262626; --muted:#7b7a71; --accent:#ffe05e; --accent-ink:#262626;
  --danger:#e35f5f; --radius:10px; --radius-lg:16px;
  --shadow:0 1px 3px rgba(38,38,38,.06); --shadow-lg:0 12px 32px rgba(38,38,38,.12);

  /* Chart-Rollen. Validiert gegen die Surface, auf der die Marks WIRKLICH liegen:
     Balken auf dem Track (--panel-2 #f6f6f3), Linie/Punkte auf --panel. */
  --surface-1:#fff;
  --series-1:#2a78d6;          /* eine Serie → ein Farbton */
  --ord-1:#0d366b; --ord-2:#1c5cab; --ord-3:#2a78d6; --ord-4:#6da7ec;  /* Muss→Nice */
  --chart-ink:#0b0b0b; --chart-ink-2:#52514e; --chart-muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7;
  --status-critical:#d03b3b; --status-good:#0ca30c;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0d0d0d; --panel:#1a1a19; --panel-2:#232322; --line:#2c2c2a;
    --fg:#fff; --muted:#898781; --accent:#ffe05e;
    --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 12px 32px rgba(0,0,0,.5);
    --surface-1:#1a1a19;
    --series-1:#3987e5;
    --ord-1:#cde2fb; --ord-2:#9ec5f4; --ord-3:#6da7ec; --ord-4:#3987e5;
    --chart-ink:#fff; --chart-ink-2:#c3c2b7; --chart-muted:#898781;
    --grid:#2c2c2a; --axis:#383835;
    --status-good:#3cc13c;
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Centra No1",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:15px}
a{color:inherit}
button{font:inherit;cursor:pointer}
.wrap{max-width:1140px;margin:0 auto;padding:0 20px}

/* ===== Topbar ===== */
.topbar{border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:60px}
/* Schmale Screens: Buttons in die zweite Zeile statt aus dem Viewport laufen */
@media(max-width:640px){
  .topbar .wrap{flex-wrap:wrap;height:auto;padding-top:10px;padding-bottom:10px;row-gap:8px;column-gap:8px}
  .topbar .brand{flex-basis:100%}
  .topbar .grow{display:none}
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;text-decoration:none}
.brand img{height:22px;display:block}
.brand .sep{color:var(--muted);font-weight:400}
.grow{flex:1}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:99px;padding:8px 15px;font-size:13.5px;font-weight:600;min-height:40px;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn:hover{border-color:var(--fg)}
.btn.primary{background:var(--fg);color:var(--accent);border-color:var(--fg)}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.sm{padding:5px 11px;font-size:12.5px;min-height:32px}
.btn[disabled]{opacity:.45;cursor:not-allowed}

h1{font-size:26px;font-weight:800;letter-spacing:-.3px;margin:28px 0 4px}
.sub{color:var(--muted);font-size:14px;margin-bottom:18px;word-break:break-all}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px}

/* ===== Stat-Kacheln (die Zahl IST das Chart) ===== */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:26px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.tile .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.tile .value{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-top:5px}
.tile .foot{font-size:12px;color:var(--muted);margin-top:3px}
.tile .foot.crit{color:var(--status-critical);font-weight:600}

/* ===== Karten & Charts ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
/* Grid-Items dürfen unter ihre Content-Breite schrumpfen — sonst drückt eine
   breite Tabelle die Karte aus dem Viewport, statt intern zu scrollen */
.grid>*{min-width:0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px 16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:2px}
.card .hint{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.card-head{display:flex;align-items:flex-start;gap:10px}
.card-head .grow{flex:1}
.linkish{background:none;border:0;color:var(--muted);font-size:12px;text-decoration:underline;padding:2px 0}
.linkish:hover{color:var(--fg)}

figure{margin:0}
figcaption{font-size:12px;color:var(--muted);margin-top:12px}

/* Balken: ≤24px dick, 4px runde Enden, 2px Surface-Lücke via row-gap */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:132px 1fr 44px;align-items:center;gap:10px}
.bar-row .name{font-size:13px;color:var(--chart-ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{position:relative;height:20px;background:var(--panel-2);border-radius:4px}
.bar-fill{position:absolute;inset:0 auto 0 0;border-radius:0 4px 4px 0;background:var(--series-1);min-width:2px;transition:width .35s ease}
.bar-fill[data-zero="true"]{background:var(--grid)}
.bar-row .val{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--chart-ink)}
.bar-row:hover .bar-track,.bar-row:focus-visible .bar-track{outline:2px solid var(--line);outline-offset:2px}
.bar-row:focus{outline:none}

/* Sparkline / Verlauf */
.spark{width:100%;height:150px;display:block;overflow:visible}
.spark .grid-line{stroke:var(--grid);stroke-width:1}
.spark .axis-line{stroke:var(--axis);stroke-width:1}
.spark .series{fill:none;stroke:var(--series-1);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.spark .area{fill:var(--series-1);opacity:.10}
.spark .dot{fill:var(--series-1);stroke:var(--surface-1);stroke-width:2}
.spark .tick{fill:var(--chart-muted);font-size:10.5px}
.spark .hit{fill:transparent;cursor:crosshair}
.spark .cross{stroke:var(--axis);stroke-width:1}
/* [hidden] wirkt nur auf HTML-Elemente (UA-Stylesheet) — SVG-Gruppen brauchen die Regel selbst,
   sonst hängt der Crosshair-Punkt sichtbar bei 0,0 */
.spark [data-role="cursor"][hidden]{display:none}

.tooltip{position:fixed;z-index:50;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-lg);padding:7px 10px;font-size:12.5px;pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap}
.tooltip[data-show="true"]{opacity:1}
.tooltip b{font-variant-numeric:tabular-nums}

/* Tabellen (auch als barrierefreie Chart-Alternative) */
.table-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;white-space:nowrap}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--panel-2)}
tr:last-child td{border-bottom:0}
.proj-url{font-weight:600;display:block;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-host{font-size:11.5px;color:var(--muted);display:block}
.data-table{margin-top:14px;border-top:1px solid var(--line)}
.data-table[hidden]{display:none}
.pagelink{font-size:12.5px;white-space:nowrap}

/* Priorität als Ordinal-Rampe, immer mit Text daneben */
.pri-dot{width:10px;height:10px;border-radius:2px;display:inline-block;vertical-align:-1px;margin-right:6px}
.pri-must{background:var(--ord-1)} .pri-should{background:var(--ord-2)}
.pri-could{background:var(--ord-3)} .pri-nice{background:var(--ord-4)}

.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--panel-2);border-radius:99px;padding:3px 9px;font-size:12px;color:var(--muted)}
.chip.on{background:var(--fg);color:var(--accent);border-color:var(--fg)}
a.chip{text-decoration:none}
a.chip:hover{border-color:var(--fg);color:var(--fg)}

/* Fortschritt (erledigte Kommentare) */
.progress{height:8px;background:var(--panel-2);border-radius:99px;overflow:hidden}
.progress>span{display:block;height:100%;border-radius:99px;background:var(--status-good);transition:width .3s ease}

/* ===== Projekt-Karten in der Übersicht ===== */
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:22px}
.proj-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px 14px;display:flex;flex-direction:column;gap:10px}
.proj-title{background:none;border:0;text-align:left;padding:0;cursor:pointer}
.proj-card .proj-url{max-width:100%;font-size:15.5px}
.proj-title:hover .proj-url{text-decoration:underline}
.proj-stats{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:12.5px;color:var(--muted)}
.proj-stats b{color:var(--fg);font-variant-numeric:tabular-nums}
.proj-chips{display:flex;flex-wrap:wrap;gap:6px}
.proj-foot{font-size:12px;color:var(--muted);margin-top:auto}
.proj-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ===== Status-Workflow ===== */
.st-btns{display:inline-flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;background:var(--panel)}
.st-btns button{border:0;background:transparent;padding:3px 10px;font-size:11.5px;color:var(--muted);white-space:nowrap}
.st-btns button+button{border-left:1px solid var(--line)}
.st-btns button.on{background:var(--fg);color:var(--accent)}
.st-btns button:hover:not(.on){color:var(--fg)}
.cmt[data-done="true"]{opacity:.62}
.cmt[data-done="true"] .thumb{filter:grayscale(.8)}

/* ===== Nächste Schritte ===== */
.next{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:4px}
.next li{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:13.5px;padding:9px 12px;border:1px solid var(--line);border-radius:8px}
.next .next-text{flex:1;min-width:180px}
.next .who{color:var(--muted);font-size:12px;white-space:nowrap}

/* ===== Suche & Sortierung in der Kommentarliste ===== */
.ctl{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:8px;padding:6px 9px;font:inherit;font-size:12.5px}
.searchbar{display:flex;align-items:center;gap:10px;margin:12px 0 2px}
.searchbar input{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:8px;padding:8px 12px;font:inherit;font-size:13.5px}
.searchbar input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--fg)}
#search-note{font-size:12px;color:var(--muted);white-space:nowrap}

/* ===== Screenshot-Lightbox ===== */
.cmt .thumb{cursor:zoom-in}
#lightbox{position:fixed;inset:0;z-index:100;background:rgba(10,10,9,.78);display:grid;place-items:center;padding:24px;cursor:zoom-out}
#lightbox[hidden]{display:none}
#lightbox figure{max-width:min(1100px,94vw);text-align:center}
#lightbox img{max-width:100%;max-height:82vh;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.6);background:#fff}
#lightbox figcaption{color:#f3f2ec;font-size:13.5px;margin-top:12px;max-width:70ch;margin-left:auto;margin-right:auto}
#lightbox-close{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:99px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.45);color:#fff;font-size:17px;cursor:pointer}
#lightbox-close:hover,#lightbox-close:focus-visible{background:rgba(0,0,0,.75);outline:2px solid #fff;outline-offset:2px}
.cmt .thumb:focus-visible{outline:2px solid var(--fg);outline-offset:2px}

.next .next-done{margin-left:auto}

/* Touch-Geräte & schmale Screens: Bedienelemente auf greifbare Größe bringen */
@media(pointer:coarse),(max-width:640px){
  .st-btns button{padding:8px 12px;font-size:12px}
  .chip{padding:7px 12px;font-size:12.5px}
  .pagelink{display:inline-block;padding:8px 4px}
  .linkish{padding:8px 4px}
  .cmt{grid-template-columns:72px 1fr}
  .cmt .thumb,.cmt .thumb-ph{width:72px;height:54px}
}

.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty h2{font-size:18px;color:var(--fg);margin-bottom:6px}
.empty p{max-width:460px;margin:0 auto 18px}

/* Detailansicht */
.detail{margin-top:6px}
.back{margin:22px 0 6px}
.cmt{display:grid;grid-template-columns:96px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.cmt:last-child{border-bottom:0}
.cmt .thumb{width:96px;height:72px;border:1px solid var(--line);border-radius:8px;object-fit:cover;background:var(--panel-2)}
.cmt .thumb-ph{width:96px;height:72px;border:1px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:10.5px;text-align:center;padding:4px}
.cmt .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:5px}
.cmt .sel{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted);word-break:break-all}
.cmt .txt{margin:4px 0 2px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 4px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
footer{color:var(--muted);font-size:12.5px;padding:34px 0;text-align:center}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="./">
      <picture><source srcset="pilot-logo-dark.svg" media="(prefers-color-scheme: dark)"><img src="pilot-logo.svg" alt="pilot"></picture>
      <span>VibeFeedback</span><span class="sep">/</span><span>Dashboard</span>
    </a>
    <span class="grow"></span>
    <button class="btn sm" id="btn-export-all" title="Alle Projekte samt Screenshots als ZIP sichern">⬇ Alles exportieren</button>
    <button class="btn sm" id="btn-refresh" title="Daten neu aus dem Browser-Speicher lesen">↻ Aktualisieren</button>
    <a class="btn sm" href="./">← Startseite</a>
  </div>
</header>

<main class="wrap" id="app">
  <div class="empty"><p>Lade …</p></div>
</main>

<div class="tooltip" id="tip" role="status" aria-live="polite"></div>

<div id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Screenshot in Großansicht">
  <button id="lightbox-close" aria-label="Großansicht schließen (Esc)">✕</button>
  <figure><img alt="Screenshot des kommentierten Elements"><figcaption></figcaption></figure>
</div>

<footer class="wrap">
  Alle Daten liegen ausschließlich im <code>localStorage</code> dieses Browsers — nichts wird hochgeladen.
</footer>

<script src="vf-zip.js"></script>
<script>
"use strict";
/* ============================================================================
   Daten: alles kommt aus dem localStorage dieses Browsers.
   Kommentar-Stores liegen unter "vibefeedback:v2:<url>", Meta-Keys (author,
   coach-seen …) haben denselben Präfix — die trennt der http-Test.
   ========================================================================== */
const STORE_PREFIX = "vibefeedback:v2:";

const CATEGORIES = [
  { id:"bug",      label:"Bug",     emoji:"🐛" },
  { id:"feature",  label:"Feature", emoji:"✨" },
  { id:"design",   label:"Design",  emoji:"🎨" },
  { id:"copy",     label:"Copy",    emoji:"📝" },
  { id:"question", label:"Frage",   emoji:"❓" },
  { id:"praise",   label:"Lob",     emoji:"❤️" },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
const PRIORITIES = [
  { id:"must",   label:"Muss",   cls:"pri-must" },
  { id:"should", label:"Sollte", cls:"pri-should" },
  { id:"could",  label:"Könnte", cls:"pri-could" },
  { id:"nice",   label:"Nice",   cls:"pri-nice" },
];
const PRI_MAP = Object.fromEntries(PRIORITIES.map(p => [p.id, p]));
const PRI_ORDER = { must:0, should:1, could:2, nice:3 };

/* Status-Workflow: Grundlage für die kollaborative Nutzung — wer beim Bauen
   unterstützt, arbeitet die Punkte hier ab. Fehlendes Feld = offen, damit
   alle Bestandsdaten und Importe ohne Migration funktionieren. */
const STATUSES = [
  { id:"open",  label:"Offen",     chip:"○" },
  { id:"doing", label:"In Arbeit", chip:"◐" },
  { id:"done",  label:"Erledigt",  chip:"✓" },
];
const ST_MAP = Object.fromEntries(STATUSES.map(s => [s.id, s]));
const st = c => ST_MAP[c.status] ? c.status : "open";

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const tsMs = c => typeof c.ts === "number" ? c.ts : (Date.parse(c.ts) || 0);
const fmtDate = ms => ms ? new Date(ms).toLocaleDateString("de-DE", { day:"2-digit", month:"short", year:"numeric" }) : "—";
const fmtDateTime = ms => ms ? new Date(ms).toLocaleString("de-DE") : "—";
const relTime = ms => {
  if(!ms) return "—";
  const days = Math.floor((Date.now() - ms) / 864e5);
  if(days <= 0) return "heute";
  if(days === 1) return "gestern";
  if(days < 30) return `vor ${days} Tagen`;
  const months = Math.floor(days / 30);
  return months < 12 ? `vor ${months} Monat${months===1?"":"en"}` : `vor ${Math.floor(months/12)} Jahr${Math.floor(months/12)===1?"":"en"}`;
};
const hostOf = url => { try { return new URL(url).host; } catch(e){ return url; } };
// Nur eingebettete Rasterbilder anzeigen — eine externe URL im Store wäre ein
// Tracking-Pixel (Referer-Leak), SVG könnte Skripte tragen.
const safeShot = v => (typeof v === "string" && /^data:image\/(png|jpeg|jpg|gif|webp);base64,/i.test(v)) ? v : null;
const pathOf = url => { try { const u = new URL(url); return (u.pathname + u.search + u.hash) || "/"; } catch(e){ return ""; } };
const isHttp = u => /^https?:\/\//i.test(u || "");
const trunc = (s, n) => s.length > n ? s.slice(0, n - 1).trimEnd() + "…" : s;
// pageUrl stammt aus Importen und ist damit fremde Eingabe — nur http(s) verlinken
const toolHref = (url, owner = true) => `./?src=${encodeURIComponent(url)}${owner ? "&owner=1" : ""}`;
const projTitle = p => pathOf(p.src) === "/" ? hostOf(p.src) : pathOf(p.src);

/* Alle abgeleiteten Kennzahlen an einem Ort — läuft beim Laden und nach jeder
   Status-Änderung, damit Kacheln und Karten nie auseinanderlaufen. */
function decorate(p){
  const maxOf = (arr, fn) => arr.reduce((m, x) => Math.max(m, fn(x)), 0);
  const minOf = (arr, fn) => arr.reduce((m, x) => { const v = fn(x); return v ? Math.min(m, v) : m; }, Infinity);
  p.lastTs   = maxOf(p.comments, tsMs);
  p.firstTs  = minOf(p.comments, tsMs);
  p.authors  = [...new Set(p.comments.map(c => (c.author || "").trim()).filter(Boolean))];
  p.shots    = p.comments.filter(c => safeShot(c.screenshot)).length;
  p.must     = p.comments.filter(c => c.priority === "must").length;
  p.done     = p.comments.filter(c => st(c) === "done").length;
  p.doing    = p.comments.filter(c => st(c) === "doing").length;
  p.open     = p.comments.length - p.done;
  p.openMust = p.comments.filter(c => c.priority === "must" && st(c) !== "done").length;
  p.pages    = [...new Set(p.comments.map(c => c.pageUrl || p.src))];
  return p;
}

function loadProjects(){
  const projects = [];
  for(let i = 0; i < localStorage.length; i++){   // wirft, wenn Storage blockiert ist
    const key = localStorage.key(i);
    if(!key || !key.startsWith(STORE_PREFIX)) continue;
    const src = key.slice(STORE_PREFIX.length);
    if(!/^https?:\/\//i.test(src)) continue;   // Meta-Keys wie ":author" überspringen
    let comments;
    try{
      comments = JSON.parse(localStorage.getItem(key) || "[]");
      if(!Array.isArray(comments)) continue;
    }catch(e){ continue; }
    if(!comments.length) continue;
    projects.push(decorate({ key, src, comments }));
  }
  projects.sort((a, b) => b.lastTs - a.lastTs);
  return projects;
}

/* Status zurück in den Store schreiben. Frisch lesen statt die geladene Kopie
   zu speichern — ein zweiter Tab könnte inzwischen kommentiert haben. */
function setStatus(p, cmt, status){
  if(!ST_MAP[status]) return false;
  try{
    const arr = JSON.parse(localStorage.getItem(p.key) || "[]");
    const hit = arr.find(x => (cmt.id && x.id === cmt.id) || (x.selector === cmt.selector && x.ts === cmt.ts));
    if(!hit) return false;
    if(status === "open") delete hit.status; else hit.status = status;
    localStorage.setItem(p.key, JSON.stringify(arr));
  }catch(e){ console.warn("[vf] status", e); return false; }
  if(status === "open") delete cmt.status; else cmt.status = status;
  decorate(p);
  return true;
}

const countBy = (items, keyFn) => items.reduce((acc, x) => { const k = keyFn(x); acc[k] = (acc[k] || 0) + 1; return acc; }, {});

async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    let done = false;
    try{ done = document.execCommand("copy"); }catch(e2){}
    ta.remove();
    return done;
  }
}
function flashBtn(btn, label){
  const old = btn.textContent;
  btn.textContent = label; btn.disabled = true;
  setTimeout(() => { btn.textContent = old; btn.disabled = false; }, 1400);
}

/* ============================================================================
   Charts. Regeln: eine Serie → ein Farbton; Prioritäten sind geordnet →
   Ordinal-Rampe (ein Hue, hell→dunkel) mit Text daneben, nie Farbe allein.
   Zu jedem Chart gehört eine Tabellenansicht.
   ========================================================================== */
const tip = document.getElementById("tip");
function showTip(text, x, y){
  // textContent, nicht innerHTML: der Browser dekodiert Entities schon beim Parsen
  // des data-tip-Attributs, ein esc() beim Bauen wäre also wirkungslos.
  tip.textContent = text;
  tip.dataset.show = "true";
  const pad = 12;
  const r = tip.getBoundingClientRect();
  tip.style.left = Math.min(x + pad, innerWidth - r.width - 8) + "px";
  tip.style.top  = Math.max(y - r.height - pad, 8) + "px";
}
const hideTip = () => { tip.dataset.show = "false"; };

// Horizontales Balkendiagramm, eine Serie, direkt beschriftet.
// Ein einzelner Balken oder lauter gleich lange Balken tragen keine Information —
// in dem Fall meldet die Funktion `degenerate` und der Aufrufer zeigt Zahl bzw. Tabelle.
function barChart(rows, opts = {}){
  const nonZero = rows.filter(r => r.value > 0);
  const values = new Set(nonZero.map(r => r.value));
  const degenerate = nonZero.length <= 1 || (values.size === 1 && !opts.keepOrder);
  const max = Math.max(1, ...rows.map(r => r.value));
  const bars = rows.map(r => {
    const pct = (r.value / max) * 100;
    const fillStyle = r.color ? `background:${r.color}` : "";
    const unit = opts.unit || (r.value === 1 ? "Kommentar" : "Kommentare");
    return `<div class="bar-row" data-tip="${esc(r.label + ": " + r.value + " " + unit)}">
        <span class="name">${r.icon ? r.icon + " " : ""}${esc(r.label)}</span>
        <span class="bar-track"><span class="bar-fill" data-zero="${r.value === 0}" style="width:${pct}%;${fillStyle}"></span></span>
        <span class="val">${r.value}</span>
      </div>`;
  }).join("");
  const table = `<table>
      <caption class="sr-only">${esc(opts.title || "Verteilung")}</caption>
      <thead><tr><th>${esc(opts.dimension || "Kategorie")}</th><th class="num">Anzahl</th><th class="num">Anteil</th></tr></thead>
      <tbody>${rows.map(r => {
        const total = rows.reduce((n, x) => n + x.value, 0) || 1;
        return `<tr><td>${r.icon ? r.icon + " " : ""}${esc(r.label)}</td><td class="num">${r.value}</td><td class="num">${Math.round(r.value / total * 100)} %</td></tr>`;
      }).join("")}</tbody></table>`;
  return { bars, table, degenerate, rows: nonZero };
}

// Verlauf: eine Linie + Fläche, Crosshair-Tooltip.
function lineChart(series, id){
  if(series.length < 2) return null;
  // Flache Nulllinie mit "Maximum"-Punkt auf 0 wäre irreführend
  if(series.every(d => !d.value)) return null;
  const W = 640, H = 150, padL = 30, padR = 8, padT = 10, padB = 22;
  const maxV = Math.max(1, ...series.map(d => d.value));
  const stepX = (W - padL - padR) / (series.length - 1);
  const x = i => padL + i * stepX;
  const y = v => padT + (1 - v / maxV) * (H - padT - padB);

  const pts = series.map((d, i) => [x(i), y(d.value)]);
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = `${path} L ${x(series.length-1).toFixed(1)} ${y(0)} L ${x(0).toFixed(1)} ${y(0)} Z`;

  // Nur Endpunkte + Maximum direkt markieren — nie jeden Punkt beschriften
  const maxI = series.reduce((best, d, i) => d.value > series[best].value ? i : best, 0);
  const gridVals = [0, Math.round(maxV / 2), maxV].filter((v, i, a) => a.indexOf(v) === i);

  return `<svg class="spark" viewBox="0 0 ${W} ${H}" role="img" aria-labelledby="${id}-t">
    <title id="${id}-t">Kommentare pro Tag, ${series.length} Tage, Maximum ${maxV}</title>
    ${gridVals.map(v => `<line class="grid-line" x1="${padL}" x2="${W-padR}" y1="${y(v)}" y2="${y(v)}"/>
      <text class="tick" x="${padL-6}" y="${y(v)+3.5}" text-anchor="end">${v}</text>`).join("")}
    <line class="axis-line" x1="${padL}" x2="${W-padR}" y1="${y(0)}" y2="${y(0)}"/>
    <path class="area" d="${area}"/>
    <path class="series" d="${path}"/>
    <circle class="dot" cx="${x(maxI)}" cy="${y(series[maxI].value)}" r="4"/>
    <text class="tick" x="${padL}" y="${H-6}" text-anchor="start">${esc(series[0].label)}</text>
    <text class="tick" x="${W-padR}" y="${H-6}" text-anchor="end">${esc(series[series.length-1].label)}</text>
    <g data-role="hits">
      ${series.map((d, i) => `<rect class="hit" x="${x(i) - stepX/2}" y="${padT}" width="${stepX}" height="${H-padT-padB}"
        data-tip="${esc(d.label)}: ${d.value} Kommentar${d.value===1?"":"e"}" data-cx="${x(i)}" data-cy="${y(d.value)}"/>`).join("")}
    </g>
    <g data-role="cursor" hidden>
      <line class="cross" y1="${padT}" y2="${y(0)}"/>
      <circle class="dot" r="4.5"/>
    </g>
  </svg>`;
}

// Zeigt das Balkendiagramm — oder bei entarteten Daten die aussagekräftigere Form:
// eine Zahl (ein Balken) bzw. die Tabelle (alle Balken gleich lang).
function barsOrFallback(chart, opts = {}){
  if(!chart.rows.length) return `<p style="color:var(--muted);font-size:13.5px">${esc(opts.empty || "Keine Daten.")}</p>`;
  if(!chart.degenerate) return `<figure><div class="bars">${chart.bars}</div></figure>`;
  if(chart.rows.length === 1){
    const r = chart.rows[0];
    return `<div class="tile" style="box-shadow:none;border:0;padding:6px 0">
      <div class="value">${r.value}</div>
      <div class="foot">${r.icon ? r.icon + " " : ""}${esc(r.label)}${opts.only ? " — " + esc(opts.only) : ""}</div>
    </div>`;
  }
  return `<div class="table-wrap">${chart.table}</div>
    <p style="color:var(--muted);font-size:12.5px;margin-top:10px">Alle Werte gleich — die Tabelle sagt hier mehr als ein Balken.</p>`;
}

function bindChartHovers(root){
  root.querySelectorAll("[data-tip]").forEach(el => {
    // Tastatur-Parität: derselbe Wert bei Fokus wie beim Hover
    if(el.classList.contains("bar-row")){
      el.tabIndex = 0;
      el.addEventListener("focus", () => {
        const r = el.getBoundingClientRect();
        showTip(el.dataset.tip, r.left + r.width / 2, r.top);
      });
      el.addEventListener("blur", hideTip);
    }
    el.addEventListener("pointermove", e => {
      showTip(el.dataset.tip, e.clientX, e.clientY);
      const svg = el.closest("svg");
      if(svg && el.dataset.cx){
        const cur = svg.querySelector('[data-role="cursor"]');
        cur.removeAttribute("hidden");
        cur.querySelector("line").setAttribute("x1", el.dataset.cx);
        cur.querySelector("line").setAttribute("x2", el.dataset.cx);
        cur.querySelector("circle").setAttribute("cx", el.dataset.cx);
        cur.querySelector("circle").setAttribute("cy", el.dataset.cy);
      }
    });
    el.addEventListener("pointerleave", () => {
      hideTip();
      const svg = el.closest("svg");
      if(svg) svg.querySelector('[data-role="cursor"]')?.setAttribute("hidden", "");
    });
  });
  root.querySelectorAll("[data-toggle-table]").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = root.querySelector("#" + btn.dataset.toggleTable);
      const shown = !t.hasAttribute("hidden");
      t.toggleAttribute("hidden", shown);
      btn.textContent = shown ? "Als Tabelle" : "Tabelle ausblenden";
      btn.setAttribute("aria-expanded", String(!shown));
    });
  });
}

/* Aktivität der letzten N Tage, lückenlos (Tage ohne Kommentar = 0) */
function dailySeries(comments, days = 30){
  const out = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const counts = countBy(comments.filter(c => tsMs(c)), c => {
    const d = new Date(tsMs(c)); d.setHours(0,0,0,0); return d.getTime();
  });
  for(let i = days - 1; i >= 0; i--){
    const d = new Date(today.getTime() - i * 864e5);
    out.push({ label: d.toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit" }), value: counts[d.getTime()] || 0 });
  }
  return out;
}

/* Kategorie-/Prioritäts-Charts, in Übersicht wie Projekt-Detail identisch gebaut */
function categoryChart(comments){
  const rows = CATEGORIES.map(c => ({ label:c.label, icon:c.emoji, value: comments.filter(x => x.category === c.id).length }))
                         .sort((a, b) => b.value - a.value);
  const other = comments.filter(x => !CAT_MAP[x.category]).length;
  if(other) rows.push({ label:"Sonstige", icon:"•", value: other });
  return barChart(rows, { title:"Kommentare nach Kategorie", dimension:"Kategorie" });
}
function priorityChart(comments){
  const rows = PRIORITIES.map((p, i) => ({
    label: p.label, value: comments.filter(x => x.priority === p.id).length,
    color: `var(--ord-${i + 1})`
  }));
  const other = comments.filter(x => !PRI_MAP[x.priority]).length;
  if(other) rows.push({ label:"Ohne Priorität", value: other });
  return barChart(rows, { title:"Kommentare nach Priorität", dimension:"Priorität", keepOrder:true });
}

/* ============================================================================
   Prompt-Baustein: die offenen Punkte eines Projekts als fertiger Arbeitsauftrag
   für ein Coding-Tool — das Bindeglied zwischen Feedback und nächster Iteration.
   ========================================================================== */
function buildPrompt(p){
  const open = p.comments.filter(c => st(c) !== "done")
    .sort((a, b) => (PRI_ORDER[a.priority] ?? 4) - (PRI_ORDER[b.priority] ?? 4) || tsMs(a) - tsMs(b));
  const L = [];
  L.push(`Du bekommst Nutzer-Feedback zur Seite ${p.src}.`);
  L.push(`Setze die offenen Punkte um — in der Reihenfolge unten, dringendste zuerst.`);
  L.push(`Wenn ein Punkt unklar ist, triff eine sinnvolle Annahme und dokumentiere sie kurz.`);
  L.push("");
  const groups = PRIORITIES.map(pr => ({ pr, items: open.filter(c => c.priority === pr.id) })).filter(g => g.items.length);
  const rest = open.filter(c => !PRI_MAP[c.priority]);
  if(rest.length) groups.push({ pr: { label:"Weitere" }, items: rest });
  groups.forEach(g => {
    L.push(`## ${g.pr.label} (${g.items.length})`);
    g.items.forEach((c, i) => {
      const cat = CAT_MAP[c.category] || { label:"Hinweis" };
      const loc = [];
      if(c.pageUrl) loc.push(`Seite \`${pathOf(c.pageUrl) || c.pageUrl}\``);
      if(c.selector) loc.push(`Element \`${c.selector}\``);
      L.push(`${i + 1}. [${cat.label}] ${c.text || "(ohne Text)"}${loc.length ? " — " + loc.join(", ") : ""}${c.author ? ` (von ${c.author})` : ""}${st(c) === "doing" ? " _(bereits in Arbeit)_" : ""}`);
    });
    L.push("");
  });
  L.push(`Insgesamt ${open.length} offene${open.length === 1 ? "r" : ""} Punkt${open.length === 1 ? "" : "e"}, Stand ${new Date().toLocaleDateString("de-DE")}.`);
  return L.join("\n");
}

/* Screenshot-Lightbox: die 96px-Thumbnails sind sonst eine Sackgasse.
   Tastatur: Thumbnail ist fokussierbar (role=button), beim Öffnen wandert der
   Fokus auf den Schließen-Button und beim Schließen zurück zum Thumbnail. */
const lightbox = document.getElementById("lightbox");
let lightboxOpener = null;
function openLightbox(src, caption, opener){
  lightboxOpener = opener || document.activeElement;
  lightbox.querySelector("img").src = src;
  lightbox.querySelector("figcaption").textContent = caption;
  lightbox.hidden = false;
  document.body.style.overflow = "hidden";
  lightbox.querySelector("#lightbox-close").focus();
}
function closeLightbox(){
  lightbox.hidden = true;
  lightbox.querySelector("img").src = "";
  document.body.style.overflow = "";
  if(lightboxOpener && document.contains(lightboxOpener)) lightboxOpener.focus();
  lightboxOpener = null;
}

/* "/" springt in die Suche (wie bei GitHub & Co.) — außer man tippt gerade */
addEventListener("keydown", e => {
  if(e.key !== "/" || e.ctrlKey || e.metaKey || e.altKey) return;
  if(/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement?.tagName || "")) return;
  const s = app.querySelector("#cmt-search");
  if(s){ e.preventDefault(); s.focus(); }
});

/* Volltextsuche filtert die gerenderte Liste direkt (kein Redraw — der Fokus
   im Eingabefeld bliebe sonst nicht erhalten) */
function applySearch(){
  const q = detailFilter.q || "";
  const items = app.querySelectorAll(".cmt");
  let vis = 0;
  items.forEach(el => {
    const hit = !q || (el.dataset.search || "").includes(q);
    el.style.display = hit ? "" : "none";
    if(hit) vis++;
  });
  const note = app.querySelector("#search-note");
  if(note) note.textContent = q ? `${vis} von ${items.length} passen` : "";
  const empty = app.querySelector("#search-empty");
  if(empty) empty.hidden = !(q && items.length && vis === 0);
}

/* Hash-Routing: #p=<url> hält die Projektansicht über Reloads, macht sie
   verlinkbar und lässt den Zurück-Button des Browsers funktionieren. */
function route(){
  let src = null;
  const m = location.hash.match(/^#p=(.+)$/);
  if(m){ try{ src = decodeURIComponent(m[1]); }catch(e){} }
  const idx = PROJECTS.findIndex(p => p.src === src);
  if(idx >= 0) renderDetail(idx); else renderOverview();
}
function gotoOverview(){
  if(location.hash && location.hash !== "#") location.hash = "";
  else renderOverview();
}

  }));
}

let detailFilter = { category:"all", priority:"all", status:"all", q:"", sort:"new" };
const SORTERS = {
  new: (a, b) => tsMs(b) - tsMs(a),
  old: (a, b) => tsMs(a) - tsMs(b),
  pri: (a, b) => (PRI_ORDER[a.priority] ?? 4) - (PRI_ORDER[b.priority] ?? 4) || tsMs(b) - tsMs(a),
};

function renderDetail(idx){
  const p = PROJECTS[idx];
  if(!p) return renderOverview();
  detailFilter = { category:"all", priority:"all", status:"all", q:"", sort:"new" };

  const draw = () => {
    const shown = p.comments
      .filter(c => detailFilter.category === "all" || c.category === detailFilter.category)
      .filter(c => detailFilter.priority === "all" || c.priority === detailFilter.priority)
      .filter(c => detailFilter.status === "all" || st(c) === detailFilter.status)
      .sort(SORTERS[detailFilter.sort] || SORTERS.new);

    /* Kennzahlen je Seite: wo liegt Arbeit, und wohin springe ich ab? */
    const byPage = {};
    p.comments.forEach(c => {
      const url = c.pageUrl || p.src;
      const e = (byPage[url] ||= { url, n:0, must:0, open:0 });
      e.n++;
      if(c.priority === "must") e.must++;
      if(st(c) !== "done") e.open++;
    });
    const pageRows = Object.values(byPage).sort((a, b) => b.n - a.n);

    const byAuthor = countBy(p.comments.filter(c => (c.author||"").trim()), c => c.author.trim());
    const authorRows = Object.entries(byAuthor).map(([a, n]) => ({ label:a, value:n })).sort((a,b) => b.value - a.value);
    const authors = barChart(authorRows, { title:"Kommentare pro Autor:in", dimension:"Autor:in" });

    /* Brennpunkte: Elemente, die mehrfach kommentiert wurden */
    const byEl = {};
    p.comments.forEach(c => {
      const k = c.selector || "?";
      const e = (byEl[k] ||= { sel:k, n:0, open:0, label:null });
      e.n++;
      if(st(c) !== "done") e.open++;
      if(!e.label && c.info && c.info.text) e.label = c.info.text;
    });
    const hotspots = Object.values(byEl).filter(e => e.n > 1).sort((a, b) => b.n - a.n).slice(0, 6);

    const cat = categoryChart(p.comments);
    const pri = priorityChart(p.comments);
    const series  = dailySeries(p.comments, 30);
    const line    = lineChart(series, "detail-activity");
    const donePct = Math.round(p.done / p.comments.length * 100);

    /* Arbeitsliste: offene Punkte, dringendste zuerst */
    const next = p.comments.filter(c => st(c) !== "done")
      .sort((a, b) => (PRI_ORDER[a.priority] ?? 4) - (PRI_ORDER[b.priority] ?? 4) || tsMs(a) - tsMs(b))
      .slice(0, 6);

    const cmtHtml = shown.map((c, i) => {
      // Unbekannte Werte nicht als "Könnte" ausgeben — das wäre eine Behauptung
      const catC = CAT_MAP[c.category] || { emoji:"•", label:"Sonstige" };
      const priC = PRI_MAP[c.priority] || { label:"ohne Priorität", cls:"" };
      const shot = safeShot(c.screenshot);
      const thumb = shot
        ? `<img class="thumb" src="${esc(shot)}" alt="Screenshot des kommentierten Elements — öffnet die Großansicht" loading="lazy" tabindex="0" role="button">`
        : `<div class="thumb-ph">kein Screenshot</div>`;
      const pageChip = (c.pageUrl && c.pageUrl !== p.src)
        ? (isHttp(c.pageUrl)
            ? `<a class="chip" href="${esc(toolHref(c.pageUrl))}" title="Diese Seite im Feedback-Tool öffnen">📍 ${esc(pathOf(c.pageUrl))}</a>`
            : `<span class="chip">📍 ${esc(pathOf(c.pageUrl) || c.pageUrl)}</span>`)
        : "";
      const searchBlob = [c.text, c.selector, c.author, pathOf(c.pageUrl || "")].join(" ").toLowerCase();
      return `<article class="cmt" data-done="${st(c) === "done"}" data-search="${esc(searchBlob)}">
        ${thumb}
        <div>
          <div class="meta">
            <span>${catC.emoji} ${esc(catC.label)}</span>
            <span><span class="pri-dot ${priC.cls}"></span>${esc(priC.label)}</span>

            </span>

              <td class="num">${h.n}</td>

      <section class="card" style="margin-bottom:22px">

        : `<h2>Aktivität der letzten 30 Tage</h2>
           <p class="hint" style="margin-bottom:0">Keine Kommentare in den letzten 30 Tagen — das jüngste Feedback ist von ${fmtDate(p.lastTs)}.</p>`}

          <div class="grow"><h2>Alle Kommentare</h2><p class="hint">Status wird gespeichert und wandert in Export und Prompt.</p></div>

          <select id="cmt-sort" class="ctl">
            <option value="new">Neueste zuerst</option>
            <option value="old">Älteste zuerst</option>

        <div class="searchbar">

        </div>
        <div class="filters" role="group" aria-label="Nach Kategorie filtern">
          <button class="chip ${detailFilter.category==="all"?"on":""}" data-cat="all">Alle</button>
          ${CATEGORIES.filter(c => p.comments.some(x => x.category === c.id))
            .map(c => `<button class="chip ${detailFilter.category===c.id?"on":""}" data-cat="${c.id}">${c.emoji} ${c.label} ${p.comments.filter(x=>x.category===c.id).length}</button>`).join("")}
        </div>

          <button class="chip ${detailFilter.priority==="all"?"on":""}" data-pri="all">Jede Priorität</button>
          ${PRIORITIES.filter(pr => p.comments.some(x => x.priority === pr.id))
            .map(pr => `<button class="chip ${detailFilter.priority===pr.id?"on":""}" data-pri="${pr.id}"><span class="pri-dot ${pr.cls}"></span>${pr.label} ${p.comments.filter(x=>x.priority===pr.id).length}</button>`).join("")}

        <div class="filters" role="group" aria-label="Nach Status filtern">

        </div>
        <div style="margin-top:8px">${cmtHtml}</div>
        <p id="search-empty" hidden style="text-align:center;color:var(--muted);padding:24px 12px">

        </p>
      </section>
    `;
    bindChartHovers(app);
    app.querySelector("#btn-back").addEventListener("click", gotoOverview);
    app.querySelectorAll("[data-cat]").forEach(b => b.addEventListener("click", () => { detailFilter.category = b.dataset.cat; draw(); }));

    const sortSel = app.querySelector("#cmt-sort");

    app.querySelector("#btn-del").addEventListener("click", () => {
      if(!confirm(`Alle ${p.comments.length} Kommentare zu diesem Projekt endgültig löschen?\n\n${p.src}`)) return;
      localStorage.removeItem(p.key);

      gotoOverview();
    });
  };
  draw();
  window.scrollTo({ top:0 });
}


/* ============================================================================
   Export: Projekte in einem Archiv — alle (Topbar) oder ein einzelnes (Detail).
   Bewusst ein Analyse-Artefakt, kein Prompt-Markdown (das baut das Tool selbst).
   Die feedback.json liegt oben und verweist per screenshotFile in die Projekt-
   ordner — damit versteht der ZIP-Import des Tools das Archiv unverändert.
   ========================================================================== */
// Fehlt vf-zip.js (404, Adblocker), darf nur der Export ausfallen, nicht das Dashboard.
const VFZIP = window.VFZip || null;
if(!VFZIP) console.warn("[vf] vf-zip.js nicht geladen — Export deaktiviert.");

// DOM-Helfer, bewusst lokal
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
}

// RFC-4180: Feld quoten, enthaltene Anführungszeichen verdoppeln. Zeilenumbrüche
// dürfen so innerhalb eines Feldes stehen bleiben.
const csvCell = v => `"${String(v ?? "").replace(/"/g, '""')}"`;

function buildCsv(projects){
  const head = ["Projekt","Seite","Kategorie","Priorität","Status","Autor","Zeitpunkt","Selektor","Screenshot","Kommentar"];
  const rows = [head.map(csvCell).join(",")];
  projects.forEach(p => {
    [...p.comments].sort((a,b) => tsMs(a) - tsMs(b)).forEach(c => {
      rows.push([
        p.src,
        c.pageUrl || p.src,
        (CAT_MAP[c.category] || {}).label || "Sonstige",
        (PRI_MAP[c.priority] || {}).label || "ohne",
        ST_MAP[st(c)].label,
        c.author || "",
        tsMs(c) ? new Date(tsMs(c)).toISOString() : "",
        c.selector || "",
        safeShot(c.screenshot) ? "ja" : "nein",
        c.text || ""
      ].map(csvCell).join(","));
    });
  });
  // BOM, sonst zerlegt Excel die Umlaute
  return "\uFEFF" + rows.join("\r\n") + "\r\n";
}

function projectSlug(src, taken){
  let base = VFZIP.slugify(hostOf(src) + "-" + pathOf(src), 48) || "projekt";
  let name = base;
  for(let n = 2; taken.has(name); n++) name = `${base}-${n}`;
  taken.add(name);
  return name;
}

function buildArchiveFiles(projects){
  const enc = new TextEncoder();
  const files = [];
  const taken = new Set();
  const allItems = [];
  let shotCount = 0;

  projects.forEach(p => {
    const slug = projectSlug(p.src, taken);
    let shotNo = 0;   // fortlaufend über die BILDER, nicht über alle Kommentare
    [...p.comments].sort((a,b) => tsMs(a) - tsMs(b)).forEach(c => {
      const item = { ...c };
      const shot = safeShot(c.screenshot);
      delete item.screenshot;              // Bild liegt als Datei bei, nicht doppelt als base64
      item.project = p.src;
      if(shot){
        const parsed = VFZIP.dataUrlToBytes(shot);
        if(parsed){
          const label = VFZIP.slugify((c.info && c.info.text) || c.text || c.tag || "element", 32);
          const name = `${slug}/screenshots/${String(++shotNo).padStart(2, "0")}-${label}.${parsed.ext}`;
          files.push({ name, data: parsed.bytes });
          item.screenshotFile = name;      // der ZIP-Import des Tools löst das auf
          shotCount++;
        }
      }
      allItems.push(item);
    });
  });

  const readme = [
    "# VibeFeedback — Export",
    "",
    `Exportiert: ${new Date().toLocaleString("de-DE")}`,
    `${projects.length} Projekt(e) · ${allItems.length} Kommentar(e) · ${shotCount} Screenshot(s)`,
    "",
    "## Inhalt",
    "",
    "- **feedback.json** — alle Kommentare samt Status. Diese Datei kannst du im Tool importieren; die Screenshots werden aus den Projektordnern dazugeladen.",
    "- **kommentare.csv** — eine Zeile je Kommentar, für Tabellenkalkulation und Auswertung.",
    "- **&lt;projekt&gt;/screenshots/** — die Bilder, je Projekt ein Ordner.",
    "",
    "## Projekte",
    "",
    ...projects.map(p => `- ${p.src} — ${p.comments.length} Kommentar(e), ${p.open} offen, zuletzt ${fmtDateTime(p.lastTs)}`),
    ""
  ].join("\n");

  files.unshift(
    { name:"feedback.json",  data: enc.encode(JSON.stringify({ exportedAt: new Date().toISOString(), projects: projects.length, count: allItems.length, comments: allItems }, null, 2)) },
    { name:"kommentare.csv", data: enc.encode(buildCsv(projects)) },
    { name:"README.md",      data: enc.encode(readme) }
  );
  return files;
}

async function exportProjects(projects, btn){
  if(!VFZIP || !projects.length) return;
  const old = btn.textContent;
  btn.disabled = true; btn.textContent = "Packe…";
  try{
    const files = buildArchiveFiles(projects);
    const date = new Date().toISOString().slice(0, 10);
    const name = projects.length === 1
      ? `vibefeedback-${VFZIP.slugify(hostOf(projects[0].src) + "-" + pathOf(projects[0].src), 48) || "projekt"}-${date}.zip`
      : `vibefeedback-alle-${date}.zip`;
    downloadBlob(VFZIP.buildZip(files), name);
  }catch(e){
    console.warn("[vf] export", e);
    alert("Export fehlgeschlagen: " + e.message);
  }finally{
    btn.disabled = false; btn.textContent = old;
  }
}

async function exportAll(){
  await exportProjects(PROJECTS, document.getElementById("btn-export-all"));
}

function boot(){
  try{
    PROJECTS = loadProjects();
  }catch(e){
    // Blockierter Storage (Privacy-Modus, eingebettete WebViews): schon der
    // Zugriff auf localStorage wirft — sonst bliebe die Seite auf "Lade …" stehen.
    console.warn("[vf] storage", e);
    app.innerHTML = `<div class="empty">
      <h2>Kein Zugriff auf den Browser-Speicher</h2>
      <p>Das Dashboard liest deine Kommentare aus dem lokalen Speicher dieses Browsers. Der ist gerade blockiert — etwa durch strenge Privatsphäre-Einstellungen oder einen privaten Modus.</p>
      <a class="btn" href="./">← Zur Startseite</a>
    </div>`;
    return;
  }
  document.getElementById("btn-export-all").disabled = !PROJECTS.length || !VFZIP;
  route();
}
document.getElementById("btn-refresh").addEventListener("click", boot);
document.getElementById("btn-export-all").addEventListener("click", exportAll);
// Zweiter Tab kommentiert → nur neu laden, wenn wir in der Übersicht stehen und
// wirklich ein Kommentar-Store betroffen ist (nicht bei Meta-Keys).
addEventListener("storage", e => {
  if(e.key && !e.key.startsWith(STORE_PREFIX)) return;
  if(app.querySelector("#btn-back")) return;   // Detailansicht offen → nicht wegreißen
  boot();
});
boot();

if(new URLSearchParams(location.search).get("__vftest") === "1"){
  window.__vftest = { loadProjects, dailySeries, countBy, barChart, lineChart, renderOverview, renderDetail, route, exportAll, exportProjects, buildCsv, buildPrompt, projectSlug, setStatus, STATUSES, get PROJECTS(){ return PROJECTS; } };
}
</script>
</body>
