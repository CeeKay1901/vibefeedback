<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VibeFeedback — Dashboard</title>
<meta name="description" content="Übersicht aller kommentierten Projekte und Auswertung deines Feedbacks — lokal in deinem Browser.">
<link rel="icon" href="pilot-logo.svg">
<style>
/* ===== Tokens: pilot-CI für Chrome, validierte Data-Viz-Palette für Charts ===== */
:root{
  --bg:#fcfcfc; --panel:#fff; --panel-2:#f6f6f3; --line:#e3e1d6;
  --fg:#262626; --muted:#7b7a71; --accent:#ffe05e; --accent-ink:#262626;
  --danger:#e35f5f; --radius:10px; --radius-lg:16px;
  --shadow:0 1px 3px rgba(38,38,38,.06); --shadow-lg:0 12px 32px rgba(38,38,38,.12);

  /* Chart-Rollen. Validiert gegen die Surface, auf der die Marks WIRKLICH liegen:
     Balken auf dem Track (--panel-2 #f6f6f3), Linie/Punkte auf --panel. */
  --surface-1:#fff;
  --series-1:#2a78d6;          /* eine Serie → ein Farbton */
  --ord-1:#0d366b; --ord-2:#1c5cab; --ord-3:#2a78d6; --ord-4:#6da7ec;  /* Muss→Nice */
  --chart-ink:#0b0b0b; --chart-ink-2:#52514e; --chart-muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7;
  --status-critical:#d03b3b; --status-good:#0ca30c;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0d0d0d; --panel:#1a1a19; --panel-2:#232322; --line:#2c2c2a;
    --fg:#fff; --muted:#898781; --accent:#ffe05e;
    --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 12px 32px rgba(0,0,0,.5);
    --surface-1:#1a1a19;
    --series-1:#3987e5;
    --ord-1:#cde2fb; --ord-2:#9ec5f4; --ord-3:#6da7ec; --ord-4:#3987e5;
    --chart-ink:#fff; --chart-ink-2:#c3c2b7; --chart-muted:#898781;
    --grid:#2c2c2a; --axis:#383835;
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Centra No1",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:15px}
a{color:inherit}
button{font:inherit;cursor:pointer}
.wrap{max-width:1140px;margin:0 auto;padding:0 20px}

/* ===== Topbar ===== */
.topbar{border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:60px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;text-decoration:none}
.brand img{height:22px;display:block}
.brand .sep{color:var(--muted);font-weight:400}
.grow{flex:1}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:99px;padding:8px 15px;font-size:13.5px;font-weight:600;min-height:40px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--fg)}
.btn.primary{background:var(--fg);color:var(--accent);border-color:var(--fg)}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.sm{padding:5px 11px;font-size:12.5px;min-height:32px}
.btn[disabled]{opacity:.45;cursor:not-allowed}

h1{font-size:26px;font-weight:800;letter-spacing:-.3px;margin:28px 0 4px}
.sub{color:var(--muted);font-size:14px;margin-bottom:24px}

/* ===== Stat-Kacheln (die Zahl IST das Chart) ===== */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:26px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.tile .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.tile .value{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-top:5px}
.tile .foot{font-size:12px;color:var(--muted);margin-top:3px}
.tile .foot.crit{color:var(--status-critical);font-weight:600}

/* ===== Karten & Charts ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px 16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:2px}
.card .hint{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.card-head{display:flex;align-items:flex-start;gap:10px}
.card-head .grow{flex:1}
.linkish{background:none;border:0;color:var(--muted);font-size:12px;text-decoration:underline;padding:2px 0}
.linkish:hover{color:var(--fg)}

figure{margin:0}
figcaption{font-size:12px;color:var(--muted);margin-top:12px}

/* Balken: ≤24px dick, 4px runde Enden, 2px Surface-Lücke via row-gap */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:132px 1fr 44px;align-items:center;gap:10px}
.bar-row .name{font-size:13px;color:var(--chart-ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{position:relative;height:20px;background:var(--panel-2);border-radius:4px}
.bar-fill{position:absolute;inset:0 auto 0 0;border-radius:0 4px 4px 0;background:var(--series-1);min-width:2px;transition:width .35s ease}
.bar-fill[data-zero="true"]{background:var(--grid)}
.bar-row .val{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--chart-ink)}
.bar-row:hover .bar-track,.bar-row:focus-visible .bar-track{outline:2px solid var(--line);outline-offset:2px}
.bar-row:focus{outline:none}

/* Sparkline / Verlauf */
.spark{width:100%;height:150px;display:block;overflow:visible}
.spark .grid-line{stroke:var(--grid);stroke-width:1}
.spark .axis-line{stroke:var(--axis);stroke-width:1}
.spark .series{fill:none;stroke:var(--series-1);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.spark .area{fill:var(--series-1);opacity:.10}
.spark .dot{fill:var(--series-1);stroke:var(--surface-1);stroke-width:2}
.spark .tick{fill:var(--chart-muted);font-size:10.5px}
.spark .hit{fill:transparent;cursor:crosshair}
.spark .cross{stroke:var(--axis);stroke-width:1}
/* [hidden] wirkt nur auf HTML-Elemente (UA-Stylesheet) — SVG-Gruppen brauchen die Regel selbst,
   sonst hängt der Crosshair-Punkt sichtbar bei 0,0 */
.spark [data-role="cursor"][hidden]{display:none}
/* Das hidden-Attribut wird von der UA-Stylesheet nur für HTML gesetzt, nicht für SVG */
.spark [data-role="cursor"][hidden]{display:none}

.tooltip{position:fixed;z-index:50;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-lg);padding:7px 10px;font-size:12.5px;pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap}
.tooltip[data-show="true"]{opacity:1}
.tooltip b{font-variant-numeric:tabular-nums}

/* Tabellen (auch als barrierefreie Chart-Alternative) */
.table-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;white-space:nowrap}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--panel-2)}
tr:last-child td{border-bottom:0}
.proj-url{font-weight:600;display:block;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-host{font-size:11.5px;color:var(--muted)}
.data-table{margin-top:14px;border-top:1px solid var(--line)}
.data-table[hidden]{display:none}

/* Priorität als Ordinal-Rampe, immer mit Text daneben */
.pri-dot{width:10px;height:10px;border-radius:2px;display:inline-block;vertical-align:-1px;margin-right:6px}
.pri-must{background:var(--ord-1)} .pri-should{background:var(--ord-2)}
.pri-could{background:var(--ord-3)} .pri-nice{background:var(--ord-4)}

.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--panel-2);border-radius:99px;padding:3px 9px;font-size:12px;color:var(--muted)}
.chip.on{background:var(--fg);color:var(--accent);border-color:var(--fg)}

.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty h2{font-size:18px;color:var(--fg);margin-bottom:6px}
.empty p{max-width:460px;margin:0 auto 18px}

/* Detailansicht */
.detail{margin-top:6px}
.back{margin:22px 0 6px}
.cmt{display:grid;grid-template-columns:96px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.cmt:last-child{border-bottom:0}
.cmt .thumb{width:96px;height:72px;border:1px solid var(--line);border-radius:8px;object-fit:cover;background:var(--panel-2)}
.cmt .thumb-ph{width:96px;height:72px;border:1px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:10.5px;text-align:center;padding:4px}
.cmt .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:5px}
.cmt .sel{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted);word-break:break-all}
.cmt .txt{margin:4px 0 2px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 4px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
footer{color:var(--muted);font-size:12.5px;padding:34px 0;text-align:center}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="./">
      <picture><source srcset="pilot-logo-dark.svg" media="(prefers-color-scheme: dark)"><img src="pilot-logo.svg" alt="pilot"></picture>
      <span>VibeFeedback</span><span class="sep">/</span><span>Dashboard</span>
    </a>
    <span class="grow"></span>
    <button class="btn sm" id="btn-export-all" title="Alle Projekte samt Screenshots als ZIP sichern">⬇ Alles exportieren</button>
    <button class="btn sm" id="btn-refresh" title="Daten neu aus dem Browser-Speicher lesen">↻ Aktualisieren</button>
    <a class="btn sm" href="./">← Startseite</a>
  </div>
</header>

<main class="wrap" id="app">
  <div class="empty"><p>Lade …</p></div>
</main>

<div class="tooltip" id="tip" role="status" aria-live="polite"></div>

<footer class="wrap">
  Alle Daten liegen ausschließlich im <code>localStorage</code> dieses Browsers — nichts wird hochgeladen.
</footer>

<script src="vf-zip.js"></script>
<script>
"use strict";
/* ============================================================================
   Daten: alles kommt aus dem localStorage dieses Browsers.
   Kommentar-Stores liegen unter "vibefeedback:v2:<url>", Meta-Keys (author,
   coach-seen …) haben denselben Präfix — die trennt der http-Test.
   ========================================================================== */
const STORE_PREFIX = "vibefeedback:v2:";

const CATEGORIES = [
  { id:"bug",      label:"Bug",     emoji:"🐛" },
  { id:"feature",  label:"Feature", emoji:"✨" },
  { id:"design",   label:"Design",  emoji:"🎨" },
  { id:"copy",     label:"Copy",    emoji:"📝" },
  { id:"question", label:"Frage",   emoji:"❓" },
  { id:"praise",   label:"Lob",     emoji:"❤️" },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
const PRIORITIES = [
  { id:"must",   label:"Muss",   cls:"pri-must" },
  { id:"should", label:"Sollte", cls:"pri-should" },
  { id:"could",  label:"Könnte", cls:"pri-could" },
  { id:"nice",   label:"Nice",   cls:"pri-nice" },
];
const PRI_MAP = Object.fromEntries(PRIORITIES.map(p => [p.id, p]));

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const tsMs = c => typeof c.ts === "number" ? c.ts : (Date.parse(c.ts) || 0);
const fmtDate = ms => ms ? new Date(ms).toLocaleDateString("de-DE", { day:"2-digit", month:"short", year:"numeric" }) : "—";
const fmtDateTime = ms => ms ? new Date(ms).toLocaleString("de-DE") : "—";
const relTime = ms => {
  if(!ms) return "—";
  const days = Math.floor((Date.now() - ms) / 864e5);
  if(days <= 0) return "heute";
  if(days === 1) return "gestern";
  if(days < 30) return `vor ${days} Tagen`;
  const months = Math.floor(days / 30);
  return months < 12 ? `vor ${months} Monat${months===1?"":"en"}` : `vor ${Math.floor(months/12)} Jahr${Math.floor(months/12)===1?"":"en"}`;
};
const hostOf = url => { try { return new URL(url).host; } catch(e){ return url; } };
// Nur eingebettete Rasterbilder anzeigen — eine externe URL im Store wäre ein
// Tracking-Pixel (Referer-Leak), SVG könnte Skripte tragen.
const safeShot = v => (typeof v === "string" && /^data:image\/(png|jpeg|jpg|gif|webp);base64,/i.test(v)) ? v : null;
const pathOf = url => { try { const u = new URL(url); return (u.pathname + u.search + u.hash) || "/"; } catch(e){ return ""; } };

function loadProjects(){
  const projects = [];
  for(let i = 0; i < localStorage.length; i++){   // wirft, wenn Storage blockiert ist
    const key = localStorage.key(i);
    if(!key || !key.startsWith(STORE_PREFIX)) continue;
    const src = key.slice(STORE_PREFIX.length);
    if(!/^https?:\/\//i.test(src)) continue;   // Meta-Keys wie ":author" überspringen
    let comments;
    try{
      comments = JSON.parse(localStorage.getItem(key) || "[]");
      if(!Array.isArray(comments)) continue;
    }catch(e){ continue; }
    if(!comments.length) continue;
    projects.push({ key, src, comments });
  }
  const maxOf = (arr, fn) => arr.reduce((m, x) => Math.max(m, fn(x)), 0);
  const minOf = (arr, fn) => arr.reduce((m, x) => { const v = fn(x); return v ? Math.min(m, v) : m; }, Infinity);
  projects.forEach(p => {
    p.lastTs  = maxOf(p.comments, tsMs);
    p.firstTs = minOf(p.comments, tsMs);
    p.authors = [...new Set(p.comments.map(c => (c.author || "").trim()).filter(Boolean))];
    p.shots   = p.comments.filter(c => safeShot(c.screenshot)).length;
    p.must    = p.comments.filter(c => c.priority === "must").length;
    p.pages   = [...new Set(p.comments.map(c => c.pageUrl || p.src))];
  });
  projects.sort((a, b) => b.lastTs - a.lastTs);
  return projects;
}

const countBy = (items, keyFn) => items.reduce((acc, x) => { const k = keyFn(x); acc[k] = (acc[k] || 0) + 1; return acc; }, {});

/* ============================================================================
   Charts. Regeln: eine Serie → ein Farbton; Prioritäten sind geordnet →
   Ordinal-Rampe (ein Hue, hell→dunkel) mit Text daneben, nie Farbe allein.
   Zu jedem Chart gehört eine Tabellenansicht.
   ========================================================================== */
const tip = document.getElementById("tip");
function showTip(text, x, y){
  // textContent, nicht innerHTML: der Browser dekodiert Entities schon beim Parsen
  // des data-tip-Attributs, ein esc() beim Bauen wäre also wirkungslos.
  tip.textContent = text;
  tip.dataset.show = "true";
  const pad = 12;
  const r = tip.getBoundingClientRect();
  tip.style.left = Math.min(x + pad, innerWidth - r.width - 8) + "px";
  tip.style.top  = Math.max(y - r.height - pad, 8) + "px";
}
const hideTip = () => { tip.dataset.show = "false"; };

// Horizontales Balkendiagramm, eine Serie, direkt beschriftet.
// Ein einzelner Balken oder lauter gleich lange Balken tragen keine Information —
// in dem Fall meldet die Funktion `degenerate` und der Aufrufer zeigt Zahl bzw. Tabelle.
function barChart(rows, opts = {}){
  const nonZero = rows.filter(r => r.value > 0);
  const values = new Set(nonZero.map(r => r.value));
  const degenerate = nonZero.length <= 1 || (values.size === 1 && !opts.keepOrder);
  const max = Math.max(1, ...rows.map(r => r.value));
  const bars = rows.map(r => {
    const pct = (r.value / max) * 100;
    const fillStyle = r.color ? `background:${r.color}` : "";
    const unit = opts.unit || (r.value === 1 ? "Kommentar" : "Kommentare");
    return `<div class="bar-row" data-tip="${esc(r.label + ": " + r.value + " " + unit)}">
        <span class="name">${r.icon ? r.icon + " " : ""}${esc(r.label)}</span>
        <span class="bar-track"><span class="bar-fill" data-zero="${r.value === 0}" style="width:${pct}%;${fillStyle}"></span></span>
        <span class="val">${r.value}</span>
      </div>`;
  }).join("");
  const table = `<table>
      <caption class="sr-only">${esc(opts.title || "Verteilung")}</caption>
      <thead><tr><th>${esc(opts.dimension || "Kategorie")}</th><th class="num">Anzahl</th><th class="num">Anteil</th></tr></thead>
      <tbody>${rows.map(r => {
        const total = rows.reduce((n, x) => n + x.value, 0) || 1;
        return `<tr><td>${r.icon ? r.icon + " " : ""}${esc(r.label)}</td><td class="num">${r.value}</td><td class="num">${Math.round(r.value / total * 100)} %</td></tr>`;
      }).join("")}</tbody></table>`;
  return { bars, table, degenerate, rows: nonZero };
}

// Verlauf: eine Linie + Fläche, Crosshair-Tooltip.
function lineChart(series, id){
  if(series.length < 2) return null;
  // Flache Nulllinie mit "Maximum"-Punkt auf 0 wäre irreführend
  if(series.every(d => !d.value)) return null;
  const W = 640, H = 150, padL = 30, padR = 8, padT = 10, padB = 22;
  const maxV = Math.max(1, ...series.map(d => d.value));
  const stepX = (W - padL - padR) / (series.length - 1);
  const x = i => padL + i * stepX;
  const y = v => padT + (1 - v / maxV) * (H - padT - padB);

  const pts = series.map((d, i) => [x(i), y(d.value)]);
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = `${path} L ${x(series.length-1).toFixed(1)} ${y(0)} L ${x(0).toFixed(1)} ${y(0)} Z`;

  // Nur Endpunkte + Maximum direkt markieren — nie jeden Punkt beschriften
  const maxI = series.reduce((best, d, i) => d.value > series[best].value ? i : best, 0);
  const gridVals = [0, Math.round(maxV / 2), maxV].filter((v, i, a) => a.indexOf(v) === i);

  return `<svg class="spark" viewBox="0 0 ${W} ${H}" role="img" aria-labelledby="${id}-t">
    <title id="${id}-t">Kommentare pro Tag, ${series.length} Tage, Maximum ${maxV}</title>
    ${gridVals.map(v => `<line class="grid-line" x1="${padL}" x2="${W-padR}" y1="${y(v)}" y2="${y(v)}"/>
      <text class="tick" x="${padL-6}" y="${y(v)+3.5}" text-anchor="end">${v}</text>`).join("")}
    <line class="axis-line" x1="${padL}" x2="${W-padR}" y1="${y(0)}" y2="${y(0)}"/>
    <path class="area" d="${area}"/>
    <path class="series" d="${path}"/>
    <circle class="dot" cx="${x(maxI)}" cy="${y(series[maxI].value)}" r="4"/>
    <text class="tick" x="${padL}" y="${H-6}" text-anchor="start">${esc(series[0].label)}</text>
    <text class="tick" x="${W-padR}" y="${H-6}" text-anchor="end">${esc(series[series.length-1].label)}</text>
    <g data-role="hits">
      ${series.map((d, i) => `<rect class="hit" x="${x(i) - stepX/2}" y="${padT}" width="${stepX}" height="${H-padT-padB}"
        data-tip="${esc(d.label)}: ${d.value} Kommentar${d.value===1?"":"e"}" data-cx="${x(i)}" data-cy="${y(d.value)}"/>`).join("")}
    </g>
    <g data-role="cursor" hidden>
      <line class="cross" y1="${padT}" y2="${y(0)}"/>
      <circle class="dot" r="4.5"/>
    </g>
  </svg>`;
}

// Zeigt das Balkendiagramm — oder bei entarteten Daten die aussagekräftigere Form:
// eine Zahl (ein Balken) bzw. die Tabelle (alle Balken gleich lang).
function barsOrFallback(chart, opts = {}){
  if(!chart.rows.length) return `<p style="color:var(--muted);font-size:13.5px">${esc(opts.empty || "Keine Daten.")}</p>`;
  if(!chart.degenerate) return `<figure><div class="bars">${chart.bars}</div></figure>`;
  if(chart.rows.length === 1){
    const r = chart.rows[0];
    return `<div class="tile" style="box-shadow:none;border:0;padding:6px 0">
      <div class="value">${r.value}</div>
      <div class="foot">${r.icon ? r.icon + " " : ""}${esc(r.label)}${opts.only ? " — " + esc(opts.only) : ""}</div>
    </div>`;
  }
  return `<div class="table-wrap">${chart.table}</div>
    <p style="color:var(--muted);font-size:12.5px;margin-top:10px">Alle Werte gleich — die Tabelle sagt hier mehr als ein Balken.</p>`;
}

function bindChartHovers(root){
  root.querySelectorAll("[data-tip]").forEach(el => {
    // Tastatur-Parität: derselbe Wert bei Fokus wie beim Hover
    if(el.classList.contains("bar-row")){
      el.tabIndex = 0;
      el.addEventListener("focus", () => {
        const r = el.getBoundingClientRect();
        showTip(el.dataset.tip, r.left + r.width / 2, r.top);
      });
      el.addEventListener("blur", hideTip);
    }
    el.addEventListener("pointermove", e => {
      showTip(el.dataset.tip, e.clientX, e.clientY);
      const svg = el.closest("svg");
      if(svg && el.dataset.cx){
        const cur = svg.querySelector('[data-role="cursor"]');
        cur.removeAttribute("hidden");
        cur.querySelector("line").setAttribute("x1", el.dataset.cx);
        cur.querySelector("line").setAttribute("x2", el.dataset.cx);
        cur.querySelector("circle").setAttribute("cx", el.dataset.cx);
        cur.querySelector("circle").setAttribute("cy", el.dataset.cy);
      }
    });
    el.addEventListener("pointerleave", () => {
      hideTip();
      const svg = el.closest("svg");
      if(svg) svg.querySelector('[data-role="cursor"]')?.setAttribute("hidden", "");
    });
  });
  root.querySelectorAll("[data-toggle-table]").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = root.querySelector("#" + btn.dataset.toggleTable);
      const shown = !t.hasAttribute("hidden");
      t.toggleAttribute("hidden", shown);
      btn.textContent = shown ? "Als Tabelle" : "Tabelle ausblenden";
      btn.setAttribute("aria-expanded", String(!shown));
    });
  });
}

/* Aktivität der letzten N Tage, lückenlos (Tage ohne Kommentar = 0) */
function dailySeries(comments, days = 30){
  const out = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const counts = countBy(comments.filter(c => tsMs(c)), c => {
    const d = new Date(tsMs(c)); d.setHours(0,0,0,0); return d.getTime();
  });
  for(let i = days - 1; i >= 0; i--){
    const d = new Date(today.getTime() - i * 864e5);
    out.push({ label: d.toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit" }), value: counts[d.getTime()] || 0 });
  }
  return out;
}

/* ============================================================================
   Export: alle Projekte in einem Archiv.
   Bewusst ein Analyse-Artefakt, kein Prompt-Markdown (das baut das Tool selbst).
   Die feedback.json liegt oben und verweist per screenshotFile in die Projekt-
   ordner — damit versteht der ZIP-Import des Tools das Archiv unverändert.
   ========================================================================== */
// Fehlt vf-zip.js (404, Adblocker), darf nur der Export ausfallen, nicht das Dashboard.
const VFZIP = window.VFZip || null;
if(!VFZIP) console.warn("[vf] vf-zip.js nicht geladen — Export deaktiviert.");

// DOM-Helfer, bewusst lokal
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
}

// RFC-4180: Feld quoten, enthaltene Anführungszeichen verdoppeln. Zeilenumbrüche
// dürfen so innerhalb eines Feldes stehen bleiben.
const csvCell = v => `"${String(v ?? "").replace(/"/g, '""')}"`;

function buildCsv(projects){
  const head = ["Projekt","Seite","Kategorie","Priorität","Autor","Zeitpunkt","Selektor","Screenshot","Kommentar"];
  const rows = [head.map(csvCell).join(",")];
  projects.forEach(p => {
    [...p.comments].sort((a,b) => tsMs(a) - tsMs(b)).forEach(c => {
      rows.push([
        p.src,
        c.pageUrl || p.src,
        (CAT_MAP[c.category] || {}).label || "Sonstige",
        (PRI_MAP[c.priority] || {}).label || "ohne",
        c.author || "",
        tsMs(c) ? new Date(tsMs(c)).toISOString() : "",
        c.selector || "",
        safeShot(c.screenshot) ? "ja" : "nein",
        c.text || ""
      ].map(csvCell).join(","));
    });
  });
  // BOM, sonst zerlegt Excel die Umlaute
  return "\uFEFF" + rows.join("\r\n") + "\r\n";
}

function projectSlug(src, taken){
  let base = VFZIP.slugify(hostOf(src) + "-" + pathOf(src), 48) || "projekt";
  let name = base;
  for(let n = 2; taken.has(name); n++) name = `${base}-${n}`;
  taken.add(name);
  return name;
}

async function exportAll(){
  const btn = document.getElementById("btn-export-all");
  if(!VFZIP || !PROJECTS.length){ return; }
  btn.disabled = true; btn.textContent = "Packe…";
  try{
    const enc = new TextEncoder();
    const files = [];
    const taken = new Set();
    const allItems = [];
    let shotCount = 0;

    PROJECTS.forEach(p => {
      const slug = projectSlug(p.src, taken);
      let shotNo = 0;   // fortlaufend über die BILDER, nicht über alle Kommentare
      [...p.comments].sort((a,b) => tsMs(a) - tsMs(b)).forEach(c => {
        const item = { ...c };
        const shot = safeShot(c.screenshot);
        delete item.screenshot;              // Bild liegt als Datei bei, nicht doppelt als base64
        item.project = p.src;
        if(shot){
          const parsed = VFZIP.dataUrlToBytes(shot);
          if(parsed){
            const label = VFZIP.slugify((c.info && c.info.text) || c.text || c.tag || "element", 32);
            const name = `${slug}/screenshots/${String(++shotNo).padStart(2, "0")}-${label}.${parsed.ext}`;
            files.push({ name, data: parsed.bytes });
            item.screenshotFile = name;      // der ZIP-Import des Tools löst das auf
            shotCount++;
          }
        }
        allItems.push(item);
      });
    });

    const readme = [
      "# VibeFeedback — Export aller Projekte",
      "",
      `Exportiert: ${new Date().toLocaleString("de-DE")}`,
      `${PROJECTS.length} Projekt(e) · ${allItems.length} Kommentar(e) · ${shotCount} Screenshot(s)`,
      "",
      "## Inhalt",
      "",
      "- **feedback.json** — alle Kommentare. Diese Datei kannst du im Tool importieren; die Screenshots werden aus den Projektordnern dazugeladen.",
      "- **kommentare.csv** — eine Zeile je Kommentar, für Tabellenkalkulation und Auswertung.",
      "- **&lt;projekt&gt;/screenshots/** — die Bilder, je Projekt ein Ordner.",
      "",
      "## Projekte",
      "",
      ...PROJECTS.map(p => `- ${p.src} — ${p.comments.length} Kommentar(e), zuletzt ${fmtDateTime(p.lastTs)}`),
      ""
    ].join("\n");

    files.unshift(
      { name:"feedback.json",  data: enc.encode(JSON.stringify({ exportedAt: new Date().toISOString(), projects: PROJECTS.length, count: allItems.length, comments: allItems }, null, 2)) },
      { name:"kommentare.csv", data: enc.encode(buildCsv(PROJECTS)) },
      { name:"README.md",      data: enc.encode(readme) }
    );

    const blob = VFZIP.buildZip(files);
    downloadBlob(blob, `vibefeedback-alle-${new Date().toISOString().slice(0,10)}.zip`);
  }catch(e){
    console.warn("[vf] export-all", e);
    alert("Export fehlgeschlagen: " + e.message);
  }finally{
    btn.disabled = false; btn.textContent = "⬇ Alles exportieren";
  }
}

function boot(){
  try{
    PROJECTS = loadProjects();
  }catch(e){
    // Blockierter Storage (Privacy-Modus, eingebettete WebViews): schon der
    // Zugriff auf localStorage wirft — sonst bliebe die Seite auf "Lade …" stehen.
    console.warn("[vf] storage", e);
    app.innerHTML = `<div class="empty">
      <h2>Kein Zugriff auf den Browser-Speicher</h2>
      <p>Das Dashboard liest deine Kommentare aus dem lokalen Speicher dieses Browsers. Der ist gerade blockiert — etwa durch strenge Privatsphäre-Einstellungen oder einen privaten Modus.</p>
      <a class="btn" href="./">← Zur Startseite</a>
    </div>`;
    return;
  }
  document.getElementById("btn-export-all").disabled = !PROJECTS.length || !VFZIP;
  renderOverview();
}
document.getElementById("btn-refresh").addEventListener("click", boot);
document.getElementById("btn-export-all").addEventListener("click", exportAll);
// Zweiter Tab kommentiert → nur neu laden, wenn wir in der Übersicht stehen und
// wirklich ein Kommentar-Store betroffen ist (nicht bei Meta-Keys).
addEventListener("storage", e => {
  if(e.key && !e.key.startsWith(STORE_PREFIX)) return;
  if(app.querySelector("#btn-back")) return;   // Detailansicht offen → nicht wegreißen
  boot();
});
boot();

if(new URLSearchParams(location.search).get("__vftest") === "1"){
  window.__vftest = { loadProjects, dailySeries, countBy, barChart, lineChart, renderOverview, renderDetail, exportAll, buildCsv, projectSlug, get PROJECTS(){ return PROJECTS; } };
}
</script>
</body>
</html>
