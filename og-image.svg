<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Hintergrund: pilot yellow -->
  <rect width="1200" height="630" fill="#ffe05e"/>
  <!-- Dark border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#262626" stroke-width="3"/>
  <!-- Großer Text: Produktname -->
  <text x="80" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="88" font-weight="800" fill="#262626" letter-spacing="-3">VibeFeedback</text>
  <!-- Tagline -->
  <text x="80" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#262626" opacity="0.7">Klick. Kommentiere. Iteriere.</text>
  <!-- Sub-Beschreibung -->
  <text x="80" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#262626" opacity="0.55">DOM-verankertes Feedback · Kein Backend · Prompt-fertiges Markdown</text>
  <!-- URL -->
  <text x="80" y="560" font-family="ui-monospace,monospace" font-size="22" fill="#262626" opacity="0.45">ceekay1901.github.io/vibefeedback</text>
  <!-- Dekoratives Element rechts: 3 Feedback-Karten-Andeutung -->
  <g transform="translate(800, 120)">
    <rect width="320" height="80" rx="10" fill="white" opacity="0.9"/>
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#e35f5f"/>
    <text x="18" y="30" font-size="13" font-family="system-ui" fill="#262626" opacity="0.5">🐛 Bug</text>
    <text x="18" y="52" font-size="17" font-family="system-ui" fill="#262626" font-weight="600">Button reagiert nicht</text>
    <text x="18" y="70" font-size="12" font-family="ui-monospace" fill="#7b7a71">button.primary</text>
  </g>
  <g transform="translate(820, 220)">
    <rect width="320" height="80" rx="10" fill="white" opacity="0.9"/>
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#ffe05e" stroke="#262626" stroke-width="1"/>
    <text x="18" y="30" font-size="13" font-family="system-ui" fill="#262626" opacity="0.5">✨ Feature</text>
    <text x="18" y="52" font-size="17" font-family="system-ui" fill="#262626" font-weight="600">Preis prominenter</text>
    <text x="18" y="70" font-size="12" font-family="ui-monospace" fill="#7b7a71">section.pricing h2</text>
  </g>
  <g transform="translate(840, 320)">
    <rect width="320" height="80" rx="10" fill="white" opacity="0.9"/>
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#62c12d"/>
    <text x="18" y="30" font-size="13" font-family="system-ui" fill="#262626" opacity="0.5">🎨 Design</text>
    <text x="18" y="52" font-size="17" font-family="system-ui" fill="#262626" font-weight="600">Kontrast zu schwach</text>
    <text x="18" y="70" font-size="12" font-family="ui-monospace" fill="#7b7a71">p.lead</text>
  </g>
</svg>
